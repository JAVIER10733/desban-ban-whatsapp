<!-- Sidebar Component -->
 <link rel="stylesheet" href="sidebar.css">
<aside class="sidebar" id="sidebar" role="complementary" aria-label="Barra lateral">
  
  <!-- Sidebar Header -->
  <div class="sidebar-header">
    <h3 class="sidebar-title">Filtros</h3>
    <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Cerrar sidebar">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>

  <!-- Sidebar Content -->
  <div class="sidebar-content">
    
    <!-- Search -->
    <div class="sidebar-section">
      <h4 class="sidebar-section-title">Buscar</h4>
      <div class="search-box">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input 
          type="text" 
          class="search-input" 
          placeholder="Buscar..."
          aria-label="Buscar"
        >
      </div>
    </div>

    <!-- Categories -->
    <div class="sidebar-section">
      <h4 class="sidebar-section-title">Categorías</h4>
      <ul class="sidebar-list">
        <li class="sidebar-list-item active">
          <input type="checkbox" id="cat-all" checked>
          <label for="cat-all">
            <span class="check-custom"></span>
            Todas
            <span class="item-count">128</span>
          </label>
        </li>
        <li class="sidebar-list-item">
          <input type="checkbox" id="cat-1">
          <label for="cat-1">
            <span class="check-custom"></span>
            Desbaneo
            <span class="item-count">45</span>
          </label>
        </li>
        <li class="sidebar-list-item">
          <input type="checkbox" id="cat-2">
          <label for="cat-2">
            <span class="check-custom"></span>
            Baneo
            <span class="item-count">32</span>
          </label>
        </li>
        <li class="sidebar-list-item">
          <input type="checkbox" id="cat-3">
          <label for="cat-3">
            <span class="check-custom"></span>
            Consultas
            <span class="item-count">51</span>
          </label>
        </li>
      </ul>
    </div>

    <!-- Status -->
    <div class="sidebar-section">
      <h4 class="sidebar-section-title">Estado</h4>
      <div class="sidebar-radio-group">
        <label class="radio-label active">
          <input type="radio" name="status" value="all" checked>
          <span class="radio-custom"></span>
          Todos
        </label>
        <label class="radio-label">
          <input type="radio" name="status" value="active">
          <span class="radio-custom"></span>
          Activos
        </label>
        <label class="radio-label">
          <input type="radio" name="status" value="pending">
          <span class="radio-custom"></span>
          Pendientes
        </label>
        <label class="radio-label">
          <input type="radio" name="status" value="completed">
          <span class="radio-custom"></span>
          Completados
        </label>
      </div>
    </div>

    <!-- Price Range -->
    <div class="sidebar-section">
      <h4 class="sidebar-section-title">Rango de Precio</h4>
      <div class="price-range">
        <div class="price-inputs">
          <div class="price-input-group">
            <label for="price-min">Mín</label>
            <input type="number" id="price-min" class="price-input" placeholder="0" min="0">
          </div>
          <span class="price-separator">-</span>
          <div class="price-input-group">
            <label for="price-max">Máx</label>
            <input type="number" id="price-max" class="price-input" placeholder="500" min="0">
          </div>
        </div>
        <div class="price-slider">
          <div class="price-slider-track"></div>
          <div class="price-slider-thumb" style="left: 0%"></div>
          <div class="price-slider-thumb" style="left: 100%"></div>
        </div>
      </div>
    </div>

    <!-- Tags -->
    <div class="sidebar-section">
      <h4 class="sidebar-section-title">Etiquetas</h4>
      <div class="tags-container">
        <button type="button" class="tag active">Urgente</button>
        <button type="button" class="tag">Premium</button>
        <button type="button" class="tag">Nuevo</button>
        <button type="button" class="tag">Popular</button>
        <button type="button" class="tag">Oferta</button>
      </div>
    </div>

    <!-- Date Range -->
    <div class="sidebar-section">
      <h4 class="sidebar-section-title">Fecha</h4>
      <div class="date-filters">
        <button type="button" class="date-btn active">Hoy</button>
        <button type="button" class="date-btn">Esta semana</button>
        <button type="button" class="date-btn">Este mes</button>
        <button type="button" class="date-btn">Personalizado</button>
      </div>
    </div>

  </div>

  <!-- Sidebar Footer -->
  <div class="sidebar-footer">
    <button type="button" class="btn-reset" id="btnReset">
      Limpiar filtros
    </button>
    <button type="button" class="btn-apply" id="btnApply">
      Aplicar filtros
      <span class="badge" id="filterCount">3</span>
    </button>
  </div>

</aside>

<!-- Overlay for mobile -->
<div class="sidebar-overlay" id="sidebarOverlay" hidden></div>
<script src="sidebar.js"></script>
